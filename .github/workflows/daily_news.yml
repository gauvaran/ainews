name: Daily AI News

on:
  schedule:
    - cron: '30 0 * * *'   # 07:30 GMT+7 (00:30 UTC)
  workflow_dispatch:         # manual trigger for testing

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser weasyprint --quiet
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 --quiet 2>/dev/null || true

      - name: Run AI News Bot
        env:
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_BCC:      ${{ secrets.EMAIL_BCC }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
        run: python files/ai_news_bot.py

      - name: Publish web pages
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/
          git diff --staged --quiet || git commit -m "newsletter $(date +%Y-%m-%d)"
          git push
